<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snoozed</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #1D4D2E;
      --gold: #C8993A;
      --bg: #F5F3EE;
      --danger: #C0392B;
      --text: #1a1a1a;
      --muted: #888;
      --border: #E2DED6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 24px;
      color: white;
    }

    .icon.error { background: var(--danger); }

    .icon.loading {
      background: var(--green);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    p { font-size: 15px; color: var(--muted); line-height: 1.5; }

    .task-name {
      font-weight: 500;
      color: var(--text);
      margin: 12px 0;
      padding: 10px 14px;
      background: var(--bg);
      border-radius: 8px;
      font-size: 15px;
    }

    .new-date {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
    }

    .back-link {
      display: inline-block;
      margin-top: 24px;
      color: var(--green);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
    }

    .back-link:hover { text-decoration: underline; }

    .logo-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
    }

    .logo-text {
      font-size: 14px;
      font-weight: 600;
      color: var(--green);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-bar">
      <span class="logo-text">Tasks</span>
    </div>
    <div class="icon loading" id="icon">⋯</div>
    <h2 id="title">Snoozing...</h2>
    <p id="message"></p>
    <div class="task-name" id="taskName" style="display:none"></div>
    <div class="new-date" id="newDate" style="display:none"></div>
    <a href="/" class="back-link" id="backLink" style="display:none">← Back to tasks</a>
  </div>

  <script>
    const SUPABASE_URL = 'https://qesaesisbkgonaxcvvdg.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_gisnFZVNpxVPMmbxPnze6Q_7ZRSchW1';

    function formatDate(dateStr) {
      const [year, month, day] = dateStr.split('-');
      const d = new Date(year, month - 1, day);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    async function snoozeTask() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const icon = document.getElementById('icon');
      const title = document.getElementById('title');
      const message = document.getElementById('message');
      const taskName = document.getElementById('taskName');
      const newDateEl = document.getElementById('newDate');
      const backLink = document.getElementById('backLink');

      if (!id) {
        icon.textContent = '✕';
        icon.className = 'icon error';
        title.textContent = 'Invalid link';
        message.textContent = 'This snooze link is missing a task ID.';
        backLink.style.display = 'inline-block';
        return;
      }

      try {
        // Fetch current task
        const fetchRes = await fetch(`${SUPABASE_URL}/rest/v1/tasks?id=eq.${id}&select=task_name,due_date,status`, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });

        const tasks = await fetchRes.json();

        if (!tasks || tasks.length === 0) {
          icon.textContent = '✕';
          icon.className = 'icon error';
          title.textContent = 'Task not found';
          message.textContent = 'This task may have already been deleted.';
          backLink.style.display = 'inline-block';
          return;
        }

        const task = tasks[0];

        if (!task.due_date) {
          icon.textContent = '✕';
          icon.className = 'icon error';
          title.textContent = 'No due date';
          message.textContent = 'This task has no due date to snooze.';
          taskName.textContent = task.task_name;
          taskName.style.display = 'block';
          backLink.style.display = 'inline-block';
          return;
        }

        if (task.status === 'complete') {
          icon.textContent = '✕';
          icon.className = 'icon error';
          title.textContent = 'Already complete';
          message.textContent = 'This task has already been marked complete.';
          backLink.style.display = 'inline-block';
          return;
        }

        // Push due date by one day
        const d = new Date(task.due_date + 'T00:00:00');
        d.setDate(d.getDate() + 1);
        const newDate = d.toISOString().split('T')[0];

        const patchRes = await fetch(`${SUPABASE_URL}/rest/v1/tasks?id=eq.${id}`, {
          method: 'PATCH',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ due_date: newDate })
        });

        if (!patchRes.ok) throw new Error('Patch failed');

        icon.textContent = '💤';
        icon.className = 'icon';
        title.textContent = 'Snoozed';
        message.textContent = 'Due date pushed by 1 day.';
        taskName.textContent = task.task_name;
        taskName.style.display = 'block';
        newDateEl.textContent = `Now due ${formatDate(newDate)}`;
        newDateEl.style.display = 'block';
        backLink.style.display = 'inline-block';

      } catch (e) {
        icon.textContent = '✕';
        icon.className = 'icon error';
        title.textContent = 'Something went wrong';
        message.textContent = 'Could not snooze this task. Try again or open the task list.';
        backLink.style.display = 'inline-block';
        console.error(e);
      }
    }

    snoozeTask();
  </script>
</body>
</html>
