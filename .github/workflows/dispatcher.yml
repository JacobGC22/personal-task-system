name: Task Email Dispatcher

on:
  schedule:
    - cron: '0 12 * * *'  # 6am MDT (UTC-6)
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Read schedule and dispatch email workflows
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          python - <<'EOF'
          import os
          import requests
          from datetime import datetime, timezone, timedelta

          SUPABASE_URL = os.environ['SUPABASE_URL']
          SUPABASE_KEY = os.environ['SUPABASE_KEY']
          GH_TOKEN = os.environ['GH_TOKEN']
          GH_REPO = os.environ['GH_REPO']

          # Fetch schedule from Supabase
          res = requests.get(
              f'{SUPABASE_URL}/rest/v1/settings?key=eq.send_schedule',
              headers={
                  'apikey': SUPABASE_KEY,
                  'Authorization': f'Bearer {SUPABASE_KEY}'
              }
          )
          res.raise_for_status()
          rows = res.json()

          # Default to 7am, 4pm, 10pm if no settings found
          if not rows:
              schedule = {"7": True, "16": True, "22": True}
              print("WARNING: No schedule found in Supabase, using defaults (7am, 4pm, 10pm)")
          else:
              schedule = rows[0]['value']
              print(f"Schedule loaded: {schedule}")

          # Get toggled-on hours
          active_hours = [int(h) for h, v in schedule.items() if v]
          active_hours.sort()
          print(f"Active hours (MDT): {active_hours}")

          if not active_hours:
              print("No hours toggled on. No emails will be sent today.")
              exit(0)

          # MDT is UTC-6
          MDT_OFFSET = -6

          # Dispatch a workflow_dispatch for each active hour
          for hour in active_hours:
              # Convert MDT hour to UTC
              utc_hour = (hour - MDT_OFFSET) % 24

              # Build scheduled time string for today in UTC
              now_utc = datetime.now(timezone.utc)
              scheduled_utc = now_utc.replace(hour=utc_hour, minute=0, second=0, microsecond=0)

              # If this hour has already passed today, skip it
              if scheduled_utc <= now_utc:
                  print(f"Skipping {hour}:00 MDT — already passed")
                  continue

              # Trigger the send_email workflow via GitHub API
              trigger_res = requests.post(
                  f'https://api.github.com/repos/{GH_REPO}/actions/workflows/send_email.yml/dispatches',
                  headers={
                      'Authorization': f'Bearer {GH_TOKEN}',
                      'Accept': 'application/vnd.github+json',
                      'X-GitHub-Api-Version': '2022-11-28'
                  },
                  json={
                      'ref': 'main',
                      'inputs': {
                          'send_hour_mdt': str(hour)
                      }
                  }
              )

              if trigger_res.status_code == 204:
                  print(f"SUCCESS: Dispatched email for {hour}:00 MDT (UTC {utc_hour}:00)")
              else:
                  print(f"ERROR: Failed to dispatch {hour}:00 MDT — {trigger_res.status_code}: {trigger_res.text}")
          EOF
