name: Send Task Email

on:
  schedule:
    - cron: '0 13 * * *'    # 7am MDT (UTC-6), runs daily
    - cron: '0 14 * * *'    # 7am MST (UTC-7), runs daily
    - cron: '30 22 * * 1-5' # 4:30pm MDT (UTC-6), weekdays only
    - cron: '30 23 * * 1-5' # 4:30pm MST (UTC-7), weekdays only
  workflow_dispatch:
    inputs:
      force_send:
        description: 'Which email to send: morning or followup'
        required: true
        type: choice
        options:
          - morning
          - followup

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Send task email
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FORCE_SEND: ${{ github.event.inputs.force_send }}
        run: python send_task_email.py
