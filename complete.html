<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Complete</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1B3A8C;
      --gold: #F5A800;
      --bg: #F7F6F2;
      --success: #27AE60;
      --danger: #C0392B;
      --text: #1a1a1a;
      --muted: #888;
      --border: #E5E3DC;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--success);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 24px;
      color: white;
    }

    .icon.error {
      background: var(--danger);
    }

    .icon.loading {
      background: var(--navy);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.5;
    }

    .task-name {
      font-weight: 500;
      color: var(--text);
      margin: 12px 0;
      padding: 10px 14px;
      background: var(--bg);
      border-radius: 8px;
      font-size: 15px;
    }

    .back-link {
      display: inline-block;
      margin-top: 24px;
      color: var(--navy);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .logo-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
    }

    .logo {
      width: 8px;
      height: 24px;
      background: var(--gold);
      border-radius: 2px;
    }

    .logo-text {
      font-size: 14px;
      font-weight: 600;
      color: var(--navy);
      letter-spacing: -0.2px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-bar">
      <div class="logo"></div>
      <span class="logo-text">Tasks</span>
    </div>
    <div class="icon loading" id="icon">⋯</div>
    <h2 id="title">Marking complete...</h2>
    <p id="message"></p>
    <div class="task-name" id="taskName" style="display:none"></div>
    <a href="/personal-task-system/" class="back-link" id="backLink" style="display:none">← Back to tasks</a>
  </div>

  <script>
    const SUPABASE_URL = 'https://qesaesisbkgonaxcvvdg.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_gisnFZVNpxVPMmbxPnze6Q_7ZRSchW1';

    async function completeTask() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const icon = document.getElementById('icon');
      const title = document.getElementById('title');
      const message = document.getElementById('message');
      const taskName = document.getElementById('taskName');
      const backLink = document.getElementById('backLink');

      if (!id) {
        icon.textContent = '✕';
        icon.className = 'icon error';
        title.textContent = 'Invalid link';
        message.textContent = 'This completion link is missing a task ID.';
        backLink.style.display = 'inline-block';
        return;
      }

      try {
        // Fetch task name first
        const fetchRes = await fetch(`${SUPABASE_URL}/rest/v1/tasks?id=eq.${id}&select=task_name,status`, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });

        const tasks = await fetchRes.json();

        if (!tasks || tasks.length === 0) {
          icon.textContent = '✕';
          icon.className = 'icon error';
          title.textContent = 'Task not found';
          message.textContent = 'This task may have already been deleted.';
          backLink.style.display = 'inline-block';
          return;
        }

        const task = tasks[0];

        if (task.status === 'complete') {
          icon.textContent = '✓';
          icon.className = 'icon';
          title.textContent = 'Already done';
          message.textContent = 'This task was already marked complete.';
          taskName.textContent = task.task_name;
          taskName.style.display = 'block';
          backLink.style.display = 'inline-block';
          return;
        }

        // Mark complete
        const patchRes = await fetch(`${SUPABASE_URL}/rest/v1/tasks?id=eq.${id}`, {
          method: 'PATCH',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ status: 'complete' })
        });

        if (!patchRes.ok) throw new Error('Patch failed');

        icon.textContent = '✓';
        icon.className = 'icon';
        title.textContent = 'Done';
        message.textContent = 'Task marked complete.';
        taskName.textContent = task.task_name;
        taskName.style.display = 'block';
        backLink.style.display = 'inline-block';

      } catch (e) {
        icon.textContent = '✕';
        icon.className = 'icon error';
        title.textContent = 'Something went wrong';
        message.textContent = 'Could not mark this task complete. Try again or open the task list.';
        backLink.style.display = 'inline-block';
        console.error(e);
      }
    }

    completeTask();
  </script>
</body>
</html>
